<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#f5b76f">
  <title>Join a CapyParty</title>
  <meta name="description" content="Install or open CapyParty to join a nearby family game.">
  <meta property="og:title" content="You’re invited to CapyParty">
  <meta property="og:description" content="Join a nearby party for family games that work without internet after installation.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://tickitocki.com/app/capyparty/app-icon.png">
  <meta property="og:image:secure_url" content="https://tickitocki.com/app/capyparty/app-icon.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="1024">
  <meta property="og:image:alt" content="CapyParty app icon">
  <link rel="icon" href="/app/capyparty/app-icon.png">
  <link rel="apple-touch-icon" href="/app/capyparty/app-icon.png">
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #3b2a20;
      background: #fff1dc;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(160deg, #ffe3bc 0%, #fff7ea 62%, #e9f4df 100%);
    }
    main {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid rgba(98, 63, 38, 0.12);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 60px rgba(98, 63, 38, 0.14);
      text-align: center;
    }
    h1 { margin: 0 0 12px; font-size: clamp(30px, 8vw, 42px); line-height: 1.05; }
    p { margin: 0; color: #80634f; font-size: 17px; line-height: 1.5; }
    .actions { display: grid; gap: 12px; margin-top: 28px; }
    .button {
      display: block;
      padding: 15px 18px;
      border-radius: 14px;
      background: #d67938;
      color: white;
      font-size: 17px;
      font-weight: 750;
      text-decoration: none;
    }
    .button.secondary { background: #fff4e6; color: #6d452c; border: 1px solid #eac49c; }
    .button[aria-disabled="true"] { opacity: 0.55; pointer-events: none; }
    .note { margin-top: 22px; padding-top: 20px; border-top: 1px solid #ead9c8; font-size: 14px; }
    .code { margin-top: 10px; font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
    @media (max-width: 420px) { body { padding: 12px; } main { padding: 24px 18px; border-radius: 22px; } }
  </style>
</head>
<body>
  <main>
    <h1>You’re invited to CapyParty</h1>
    <p>Open the app to join the nearby party. Joining is free, and playing together works without internet after CapyParty is installed.</p>

    <div class="actions">
      <a class="button" id="open-app" href="#">Open CapyParty</a>
      <a class="button secondary" id="install-app" href="#" aria-disabled="true">Join the TestFlight beta</a>
    </div>

    <p class="note">Install before travelling. After installation, return to the invitation and tap it again.</p>
    <p class="code" id="invite-code" hidden></p>
  </main>

  <script>
    // Replace this beta destination at production launch with the App Store URL
    // for Apple ID 6786782550, including `ct=family_invite` and the provider
    // token (`pt`) when it is available.
    const INSTALL_URL = "https://testflight.apple.com/join/X5MxbHxb";
    const params = new URLSearchParams(window.location.search);
    const host = (params.get("host") || "").toLowerCase();
    const validHost = /^[a-z2-7]{12}$/.test(host);
    const openButton = document.getElementById("open-app");
    const installButton = document.getElementById("install-app");
    const inviteCode = document.getElementById("invite-code");

    if (validHost) {
      openButton.href = `capyparty://join?host=${encodeURIComponent(host)}`;
      inviteCode.textContent = `Party code: ${host}`;
      inviteCode.hidden = false;
    } else {
      openButton.hidden = true;
    }

    if (
      INSTALL_URL.startsWith("https://testflight.apple.com/join/") ||
      INSTALL_URL.startsWith("https://apps.apple.com/")
    ) {
      installButton.href = INSTALL_URL;
      installButton.removeAttribute("aria-disabled");
    } else {
      installButton.textContent = "Installation link unavailable";
    }
  </script>
</body>
</html>
